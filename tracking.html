<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="广州澎洋国际货运代理有限公司物流查询。" data-i18n-attr="content:meta.description" />
    <title>物流查询 - 广州澎洋国际货运代理有限公司</title>
    <link rel="icon" href="assets/logo-blue.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="tracking">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="广州澎洋国际货运代理有限公司首页" data-i18n-attr="aria-label:brand.aria">
        <img src="assets/logo-blue.png" alt="广州澎洋国际货运代理有限公司 Logo" data-i18n-attr="alt:brand.logoAlt" />
        <span data-i18n="company.name">广州澎洋国际货运代理有限公司</span>
      </a>
      <div class="header-actions">
        <nav class="main-nav" aria-label="主导航" data-i18n-attr="aria-label:nav.aria">
          <a class="nav-link" href="about.html" data-page-link="about" data-i18n="nav.about">公司简介</a>
          <a class="nav-link" href="services.html" data-page-link="services" data-i18n="nav.services">服务范围</a>
          <a class="nav-link" href="tracking.html" data-page-link="tracking" data-i18n="nav.tracking" hidden>物流查询</a>
          <a class="nav-link" href="contact.html" data-page-link="contact" data-i18n="nav.contact">联系我们</a>
        </nav>
        <div class="language-switcher" role="group" aria-label="语言切换" data-i18n-attr="aria-label:language.aria">
          <button class="language-option is-active" type="button" data-lang="zh">中</button>
          <button class="language-option" type="button" data-lang="en">EN</button>
          <button class="language-option" type="button" data-lang="ms">BM</button>
        </div>
      </div>
    </header>

    <main>
      <section class="page-hero compact-hero">
        <p class="eyebrow" data-i18n="tracking.eyebrow">Tracking</p>
        <h1 data-i18n="tracking.title">物流查询</h1>
        <p data-i18n="tracking.copy">当前为前端演示版本，可批量输入多个运单号查看模拟物流节点。后续接入真实接口时，可保留这一套界面结构。</p>
      </section>

      <section class="tracking-workspace" aria-label="物流查询工作台" data-i18n-attr="aria-label:tracking.workspaceAria">
        <aside class="tracking-sidebar">
          <form class="tracking-form" id="trackingForm">
            <label for="trackingNumber" data-i18n="tracking.label">运单号 / 提单号 / 柜号</label>
            <textarea id="trackingNumber" name="trackingNumber" rows="6" placeholder="例如：PY-WH-001&#10;PY-IN-002" autocomplete="off" data-i18n-attr="placeholder:tracking.placeholder">PY-WH-001
PY-IN-002
PY-CU-003
PY-DL-004
PY-SG-005
PY-EX-006
NO123456</textarea>
            <button type="submit" data-i18n="tracking.button">查询</button>
            <p class="tracking-tip" data-i18n="tracking.tip">支持换行、空格或逗号分隔，单次最多查询 30 个单号。</p>
          </form>
          <div class="tracking-list-head">
            <strong data-i18n="tracking.listTitle">查询单号</strong>
            <span id="trackingCount">0/30</span>
          </div>
          <div class="shipment-list" id="shipmentList">
            <div class="empty-state compact-empty">
              <strong data-i18n="tracking.emptyTitle">等待查询</strong>
              <span data-i18n="tracking.emptyText">请输入一个或多个单号后查看物流进度</span>
            </div>
          </div>
        </aside>

        <section class="shipment-detail" id="shipmentDetail" aria-live="polite">
          <div class="detail-placeholder">
            <img src="assets/logo-blue.png" alt="" />
            <strong data-i18n="tracking.detailEmptyTitle">选择左侧单号查看详情</strong>
            <span data-i18n="tracking.detailEmptyText">右侧将展示国际运输、客户名称、目的地和轨迹节点等信息。</span>
          </div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <img src="assets/logo-gold.png" alt="" />
      <span>© <span data-i18n="company.name">广州澎洋国际货运代理有限公司</span></span>
    </footer>

    <script src="tracking-api.js"></script>
    <script src="script.js"></script>
  </body>
</html>
